# 1. Monitor the physical hardware connection status
check program usb_cable_status with path "/usr/bin/check-usb-state.sh"
    every 1 cycles
    if status != 0 then exec "/bin/sh -c 'MONIT_INTERNAL=1 /etc/init.d/S99adbd restart'"

# 2. Monitor the core adbd daemon process
check process adbd with pidfile /var/run/adbd.pid
    start program = "/bin/sh -c 'MONIT_INTERNAL=1 /etc/init.d/S99adbd start'"
    stop program  = "/bin/sh -c 'MONIT_INTERNAL=1 /etc/init.d/S99adbd stop'"
    # FIXED: Replaced 'missed pid' with the correct Monit syntax 'does not exist'
    if does not exist then restart
